# DynamoDB テーブル定義

tables:
  - table_name: "my-app-table"
    description: "アプリケーションのメインテーブル（Single Table Design）"
    billing_mode: "PAY_PER_REQUEST"
    point_in_time_recovery: true
    encryption: "AWS_OWNED_KEY"

    key_schema:
      partition_key:
        name: "PK"
        type: "S"
      sort_key:
        name: "SK"
        type: "S"

    global_secondary_indexes:
      - index_name: "GSI1"
        description: "メールアドレスによるユーザー検索用"
        partition_key:
          name: "GSI1PK"
          type: "S"
        sort_key:
          name: "GSI1SK"
          type: "S"
        projection: "ALL"

    entities:
      - entity: "User"
        description: "ユーザーエンティティ"
        pk_pattern: "USER#{user_id}"
        sk_pattern: "PROFILE"
        gsi1pk_pattern: "EMAIL#{email}"
        gsi1sk_pattern: "USER#{user_id}"
        attributes:
          - name: "user_id"
            type: "S"
            description: "ユーザーID（UUID v4）"
          - name: "name"
            type: "S"
            description: "ユーザー名"
          - name: "email"
            type: "S"
            description: "メールアドレス"
          - name: "created_at"
            type: "S"
            description: "作成日時（ISO 8601）"
          - name: "updated_at"
            type: "S"
            description: "更新日時（ISO 8601）"
