name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Lintの実行
        run: |
          pip install ruff
          ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 依存関係のインストール
        run: |
          pip install -e ".[dev]"
      - name: ユニットテストの実行
        run: |
          pytest services/ --cov --cov-report=xml
      - name: 統合テストの実行
        run: |
          pytest tests/integration/
